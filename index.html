<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="author" content="Marsel Shakirov">
	<meta name="description" content="Фактическая погода и подробный прогноз погоды на сегодня, отображает не только температуру, но и влажность, скорость ветра, давление воздуха и погодные элементы, такие как дождь, снег или облака.
	">
	<link rel="apple-touch-icon" sizes="180x180" href="./public/favicon/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="./public/favicon/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="./public/favicon/favicon-16x16.png">
	<link rel="manifest" href="./public/favicon/site.webmanifest">
	<link rel="mask-icon" href="./public/favicon/safari-pinned-tab.svg" color="#5bbad5">
	<meta name="msapplication-TileColor" content="#da532c">
	<meta name="theme-color" content="#ffffff">

	<link rel="stylesheet" href="./styles.css">
	<title>Weather App</title>
</head>

<body>
	<div class="container">
		<div class="wrap-blur">
			<header class="header">
				<a href="/" class="header__logo logo">
					<picture>
						<source srcset="./public/images/logo-tablet.svg" media="(max-width: 1023px)">
						<img src="./public/images/logo.svg" alt="Логотип сайта WeatherApp" class="logo__icon">
					</picture>
				</a>

				<form class="search">
					<label class="search-label visually-hidden" for="search">Поиск по городу
					</label>
					<input class="search__input" type="text" name="search" id="search" placeholder="Поиск по городу">

					<button class="search__button-reset visibility-hidden" type="reset">
						<svg class="search__icon-reset svg-icon">
							<use href="./public/images/icons/input/delete.svg#delete-icon"></use>
						</svg>
					</button>

					<img class="search__icon-loupe svg-icon" src="./public/images/icons/input/search.svg" alt="" width="22"
						height="22">

				</form>
			</header>

			<main class="main">
				<h1 class="visually-hidden">WeatherApp</h1>

				<div class="weather-wrap">
					<section class="weather-conditions">
						<div class="detail">
							<h2 class="detail__location">Кременчуг-константиновское</h2>
							<time datetime="01-06" class="detail__week">Суббота, 06 января</time>
							<time datetime="11:29" class="detail__time">11:29</time>
						</div>
						<span class="degrees">-7&deg;</span>
						<div class="forecast">
							<p class="forecast__title">Облачно с прояснениями</p>
							<p class="forecast__degrees">Ощущается как -11°</p>
						</div>
					</section>

					<section class="widget">
						<h2 class="visually-hidden">Виджет погоды</h2>
						<ul class="widget-lists"></ul>
					</section>
				</div>

				<section class="slider">

					<div class="menu-wrap">
						<h2 class="menu-title">Прогноз:</h2>
						<menu class="menu">
							<li class="menu__item">
								<button id="hours" type="button" class="menu__button  button-active">на 24 часа</button>
							</li>
							<li class="menu__item">
								<button id="day" type="button" class="menu__button">на 5 дней</button>
							</li>
						</menu>
					</div>


					<div class="switch">
						<button disabled type="button" class="switch__arrow arrow-left disabled"></button>
						<div class="switch-wrap">
							<ul class="switch__lists switch-days"></ul>
							<ul class="switch__lists switch-hours visibility-hidden"></ul>
						</div>
						<button type="button" class="switch__arrow arrow-right"></button>
					</div>
				</section>

			</main>
			<footer class="footer">
				<p class="footer__title">Проект выполнен в
					рамках стажировки
					<a class="footer__link" href="https://preax.ru" target="_blank" rel="noopener noreferrer">PREAX</a>
				</p>
			</footer>
		</div>
	</div>

	<template id="switch-list">
		<li class="switch__item">
			<article class="switch-card">
				<time datetime="12:00" class="switch-card__time"></time>
				<div class="switch-card__image-block">
					<img class="switch-card__image-icon" src="#" height="32" width="32" alt="">
				</div>
				<span class="switch-card__degrees"></span>
			</article>
		</li>
	</template>


	<template id="widget-list">
		<li>
			<article class="widget-item">
				<h3 class="widget-item__title">Влажность</h3>
				<div class="widget-item__image">
					<img src="#" alt="" class="widget-item__icon" width="32" height="32">
				</div>
				<p class="widget-item__scale"></p>
				<div class="widget-item__bar progress-bar">
					<input class="progress-bar__input" type="range" name="bar" min="0" max="100">
					<div class="progress-bar__percent">
						<p class="percent">0%</p>
						<p class="percent">100%</p>
					</div>
					<p class="progress-bar__title"></p>
				</div>
			</article>
		</li>
	</template>

	<script type="module" src="./scripts/index.js"></script>
</body>

</html>
